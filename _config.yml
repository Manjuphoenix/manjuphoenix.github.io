theme: jekyll-theme-minimal
title: Manjunath D
description: RA at IISc, Bangalore
url: "https://manjuphoenix.github.io"
github_username: Manjuphoenix
email: "manjunath1055@gmail.com"
linkedin: "https://linkedin.com/manjunath-d"

markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-paginate-v2
  - jekyll-polyglot
  - jekyll-seo-tag

# pagination
permalink: /:year/:month/
pagination:
  enabled: true
  per_page: 12
  sort_reverse: true
  limit: 0
  sort_field: 'date'
  permalink: '/page/:num/'
  title: ':title'
  trail:
    before: 2
    after: 2

# multilang
languages: ['en']
default_lang: 'en'
exclude_from_localization: ['javascript', 'images', 'css']
parallel_localization: false
